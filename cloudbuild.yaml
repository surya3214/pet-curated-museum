steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/pet-curated-museum/pet-curated-museum-api:$SHORT_SHA
      - ./backend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/pet-curated-museum/pet-curated-museum-api:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pet-curated-museum-api
      - --image
      - asia-south1-docker.pkg.dev/$PROJECT_ID/pet-curated-museum/pet-curated-museum-api:$SHORT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
      - --allow-unauthenticated

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/pet-curated-museum/pet-curated-museum-api:$SHORT_SHA
